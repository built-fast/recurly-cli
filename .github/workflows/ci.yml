name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          args: --help

      - run: make fmt-check
      - run: make vet
      - run: make lint
      - run: make tidy-check
      - run: make check-surface

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: make test

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - run: govulncheck ./...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      BATS_VERSION: v1.13.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4

      - run: npm install -g @stoplight/prism-cli

      - uses: actions/cache@v4
        id: bats-cache
        with:
          path: /usr/local/lib/bats-core
          key: bats-${{ env.BATS_VERSION }}

      - name: Install BATS
        if: steps.bats-cache.outputs.cache-hit != 'true'
        run: |
          git clone --branch $BATS_VERSION --depth 1 https://github.com/bats-core/bats-core.git
          sudo bats-core/install.sh /usr/local

      - run: make test-e2e
